services:
  - type: web
    name: codesentinel-backend
    env: python
    plan: free

    rootDir: codesentinel-ai/backendclear

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: APP_ENV
        value: production

      - key: DATABASE_URL
        value: sqlite:///./codesentinel.db

      - key: GITHUB_TOKEN
        sync: false

      - key: GROQ_API_KEY
        sync: false

      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

      - key: ALLOWED_ORIGINS
        sync: false