services:
  - type: web
    name: codesentinel-backend
    runtime: python
    plan: free

    rootDir: codesentinel-ai/backend

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    autoDeploy: true

    healthCheckPath: /health

    envVars:
      - key: APP_ENV
        value: production

      - key: DATABASE_URL
        value: sqlite:///./codesentinel.db

      - key: GROQ_MODEL
        value: openai/gpt-oss-120b

      - key: ALLOWED_ORIGINS
        value: "*"

      - key: GITHUB_TOKEN
        sync: false

      - key: GROQ_API_KEY
        sync: false